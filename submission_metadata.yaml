ai_usage_summary: |
  Used Gemini for architecture discussions, designing logical filters to catch honeypots, and constructing scoring weights. Used Cursor for code editing and local validation. No candidate data was sent to external APIs.

methodology_summary: |
  Rule-based candidate ranking engine incorporating strict disqualifiers for honeypots (founding date, job duration, zero-duration expert skills), consulting-only histories, and CV-only specialists. Focuses scoring on engineering/ML titles, core semantic search and indexing skills, target YoE (5-9 years), and hybrid locations (Pune/Noida). Behavioral modifiers adjust rankings based on login recency, notice period, and responsiveness. Dynamic reasoning generation ensures unique, factual justifications for manual review.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
